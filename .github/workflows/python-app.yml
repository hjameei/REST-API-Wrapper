name: My Workflow

on: [push]

jobs:
  my_first_job:
    name: My first job
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          source ~/venvs/website/bin/activate
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt
      - name: Run script
        run: |
          source ~/venvs/website/bin/activate
          python3 test.py

